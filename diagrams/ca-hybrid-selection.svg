<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e40af"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arrowGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="980" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Hybrid CA Selection — Two Paths, One Grant</text>
  <text x="700" y="65" text-anchor="middle" font-size="13" fill="#475569">Directory request (in-city) vs Invite code (out-of-city / pre-arranged) — both produce a row in consultant_access_grants</text>

  <!-- Center diamond: where is the CA? -->
  <polygon points="700,100 920,180 700,260 480,180" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="700" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Where is the CA?</text>
  <text x="700" y="190" text-anchor="middle" font-size="11" fill="#1e3a8a">Decision made by taxpayer</text>
  <text x="700" y="210" text-anchor="middle" font-size="11" fill="#1e3a8a">based on local availability</text>

  <!-- LEFT: Directory Path -->
  <g>
    <!-- column background -->
    <rect x="30" y="290" width="640" height="630" rx="14" fill="#dcfce7" fill-opacity="0.3" stroke="#166534" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="350" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">PATH A — Directory (in-city)</text>
    <text x="350" y="340" text-anchor="middle" font-size="11" fill="#14532d">Browse listed CAs in your city · CA can accept or decline</text>

    <!-- diagonal arrow from diamond -->
    <line x1="500" y1="220" x2="350" y2="370" stroke="#166534" stroke-width="2" marker-end="url(#arrowG)"/>
    <text x="370" y="290" font-size="12" font-weight="700" fill="#166534">in my city</text>

    <!-- Step A1: Browse -->
    <rect x="100" y="370" width="500" height="62" rx="8" fill="#ffffff" stroke="#166534" stroke-width="2"/>
    <text x="350" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">A1.  GET /consultants?city=Mumbai</text>
    <text x="350" y="413" text-anchor="middle" font-size="11" fill="#475569">filter by specialization · language · fee range · experience</text>
    <text x="350" y="427" text-anchor="middle" font-size="10" fill="#475569">scoped to listed_in_directory=true · accepting_clients=true</text>

    <line x1="350" y1="432" x2="350" y2="464" stroke="#166534" stroke-width="2" marker-end="url(#arrowG)"/>

    <!-- Step A2: Pick + request -->
    <rect x="100" y="464" width="500" height="62" rx="8" fill="#ffffff" stroke="#166534" stroke-width="2"/>
    <text x="350" y="489" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">A2.  POST /consultant-access/grants</text>
    <text x="350" y="507" text-anchor="middle" font-size="11" fill="#475569">consultant_id + access_mode + tax_years</text>
    <text x="350" y="521" text-anchor="middle" font-size="11" fill="#475569">origin = directory_request · status = pending</text>

    <line x1="350" y1="526" x2="350" y2="558" stroke="#166534" stroke-width="2" marker-end="url(#arrowG)"/>

    <!-- Step A3: CA notified -->
    <rect x="100" y="558" width="500" height="62" rx="8" fill="#f1f5f9" stroke="#166534" stroke-width="2"/>
    <text x="350" y="583" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">A3.  CA notified: consultant_access_request</text>
    <text x="350" y="601" text-anchor="middle" font-size="11" fill="#475569">payload includes taxpayer PAN · name · basic details · documents</text>
    <text x="350" y="615" text-anchor="middle" font-size="11" fill="#475569">+ client_detail_url for one-click open</text>

    <line x1="350" y1="620" x2="350" y2="652" stroke="#166534" stroke-width="2" marker-end="url(#arrowG)"/>

    <!-- A4: CA decides -->
    <polygon points="350,652 540,720 350,788 160,720" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
    <text x="350" y="710" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">A4.  CA decides</text>
    <text x="350" y="730" text-anchor="middle" font-size="11" fill="#14532d">POST .../grants/{id}/respond</text>

    <!-- accept down, decline left -->
    <line x1="540" y1="720" x2="600" y2="720" stroke="#166534" stroke-width="2"/>
    <line x1="600" y1="720" x2="600" y2="850" stroke="#166534" stroke-width="2"/>
    <line x1="600" y1="850" x2="660" y2="850" stroke="#166534" stroke-width="2"/>
    <text x="555" y="713" font-size="11" font-weight="700" fill="#166534">accept</text>

    <line x1="160" y1="720" x2="60" y2="720" stroke="#991b1b" stroke-width="2"/>
    <line x1="60" y1="720" x2="60" y2="838" stroke="#991b1b" stroke-width="2"/>
    <text x="100" y="713" font-size="11" font-weight="700" fill="#991b1b">decline</text>

    <!-- Rejected terminal -->
    <rect x="40" y="838" width="180" height="50" rx="25" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
    <text x="130" y="860" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">status: rejected</text>
    <text x="130" y="878" text-anchor="middle" font-size="10" fill="#7f1d1d">notify: declined</text>
  </g>

  <!-- RIGHT: Invite Code Path -->
  <g>
    <rect x="730" y="290" width="640" height="630" rx="14" fill="#fef3c7" fill-opacity="0.3" stroke="#92400e" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="1050" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">PATH B — Invite code (out-of-city)</text>
    <text x="1050" y="340" text-anchor="middle" font-size="11" fill="#78350f">CA generates code · shares out-of-band · taxpayer redeems</text>

    <line x1="900" y1="220" x2="1050" y2="370" stroke="#92400e" stroke-width="2" marker-end="url(#arrowGr)"/>
    <text x="1010" y="290" font-size="12" font-weight="700" fill="#92400e">elsewhere /</text>
    <text x="1010" y="305" font-size="12" font-weight="700" fill="#92400e">pre-arranged</text>

    <!-- Step B1: CA generates -->
    <rect x="800" y="370" width="500" height="62" rx="8" fill="#ffffff" stroke="#92400e" stroke-width="2"/>
    <text x="1050" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#78350f">B1.  CA: POST /consultant/invite-codes</text>
    <text x="1050" y="413" text-anchor="middle" font-size="11" fill="#475569">max_uses · default_access_mode · allowed_tax_years</text>
    <text x="1050" y="427" text-anchor="middle" font-size="10" fill="#475569">returns plaintext code ONCE · server stores only hash</text>

    <line x1="1050" y1="432" x2="1050" y2="464" stroke="#92400e" stroke-width="2" marker-end="url(#arrowGr)"/>

    <!-- Step B2: Share -->
    <rect x="800" y="464" width="500" height="62" rx="8" fill="#f1f5f9" stroke="#92400e" stroke-width="2"/>
    <text x="1050" y="489" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">B2.  Share code out-of-band</text>
    <text x="1050" y="507" text-anchor="middle" font-size="11" fill="#475569">WhatsApp · email · in person</text>
    <text x="1050" y="521" text-anchor="middle" font-size="11" fill="#475569">code format: CA-XXXXXXXX · default 14-day TTL</text>

    <line x1="1050" y1="526" x2="1050" y2="558" stroke="#92400e" stroke-width="2" marker-end="url(#arrowGr)"/>

    <!-- Step B3: Redeem -->
    <rect x="800" y="558" width="500" height="62" rx="8" fill="#ffffff" stroke="#92400e" stroke-width="2"/>
    <text x="1050" y="583" text-anchor="middle" font-size="14" font-weight="600" fill="#78350f">B3.  Taxpayer redeems</text>
    <text x="1050" y="601" text-anchor="middle" font-size="11" fill="#475569">POST /consultant-access/grants/redeem-code</text>
    <text x="1050" y="615" text-anchor="middle" font-size="11" fill="#475569">access_mode ≤ code policy · tax_years ⊆ allowed</text>

    <line x1="1050" y1="620" x2="1050" y2="652" stroke="#92400e" stroke-width="2" marker-end="url(#arrowGr)"/>

    <!-- Step B4: immediate active -->
    <rect x="800" y="652" width="500" height="62" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
    <text x="1050" y="677" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">B4.  Grant: immediately active</text>
    <text x="1050" y="695" text-anchor="middle" font-size="11" fill="#475569">origin = invite_code · status = active</text>
    <text x="1050" y="709" text-anchor="middle" font-size="11" fill="#475569">CA notified: consultant_invite_code_used</text>

    <!-- arrow down to converge -->
    <line x1="1050" y1="714" x2="1050" y2="840" stroke="#166534" stroke-width="2"/>
    <line x1="1050" y1="840" x2="780" y2="840" stroke="#166534" stroke-width="2"/>
  </g>

  <!-- CONVERGE: Active terminal -->
  <rect x="500" y="820" width="400" height="68" rx="34" fill="#dcfce7" stroke="#166534" stroke-width="3"/>
  <text x="700" y="848" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">✓  Grant: status = active</text>
  <text x="700" y="868" text-anchor="middle" font-size="12" fill="#14532d">Client appears in CA's list · one-click "View" opens detail</text>
  <text x="700" y="882" text-anchor="middle" font-size="11" fill="#14532d">Same downstream behavior for both paths</text>

  <!-- Footer notes -->
  <g transform="translate(40, 940)" font-size="11">
    <text x="0" y="0" font-weight="700" fill="#0f172a">Common rules:</text>
    <text x="0" y="18" fill="#475569">• access_mode and tax_years are immutable once granted — to change scope, create a new grant.</text>
    <text x="700" y="18" fill="#475569">• Only one live grant per (consultant, taxpayer). Taxpayer can revoke at any time.</text>
  </g>
</svg>
