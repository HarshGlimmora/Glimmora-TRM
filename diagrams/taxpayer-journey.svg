<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1600" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e40af"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#991b1b"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="1600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Taxpayer Journey — End to End</text>
  <text x="550" y="65" text-anchor="middle" font-size="13" fill="#475569">Register → Verify → Workspace → Documents → Calculate → Submit (OTP) → Review</text>

  <!-- 1. Register (terminal) -->
  <rect x="420" y="100" width="260" height="56" rx="28" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">1.  Visit /register</text>
  <text x="550" y="143" text-anchor="middle" font-size="11" fill="#1e3a8a">email · password · PAN · phone · city · consents</text>

  <line x1="550" y1="156" x2="550" y2="186" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. POST /auth/register -->
  <rect x="420" y="186" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="211" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">2.  POST /auth/register</text>
  <text x="550" y="229" text-anchor="middle" font-size="11" fill="#475569">system issues email token + phone OTP</text>

  <!-- Fan out to two verifications -->
  <line x1="550" y1="242" x2="550" y2="270" stroke="#1e40af" stroke-width="2"/>
  <line x1="280" y1="270" x2="820" y2="270" stroke="#1e40af" stroke-width="2"/>
  <line x1="280" y1="270" x2="280" y2="298" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="270" x2="820" y2="298" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Email verification -->
  <rect x="160" y="298" width="240" height="60" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="280" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">3a.  POST /auth/verify-email</text>
  <text x="280" y="340" text-anchor="middle" font-size="11" fill="#475569">click long URL-safe token</text>
  <text x="280" y="354" text-anchor="middle" font-size="11" fill="#475569">email_verified_at set</text>

  <!-- Phone verification -->
  <rect x="700" y="298" width="240" height="60" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="820" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">3b.  POST /auth/verify-phone</text>
  <text x="820" y="340" text-anchor="middle" font-size="11" fill="#475569">6-digit OTP · 5-attempt lock</text>
  <text x="820" y="354" text-anchor="middle" font-size="11" fill="#475569">phone_verified_at set</text>

  <!-- Verification gate -->
  <line x1="280" y1="358" x2="280" y2="386" stroke="#1e40af" stroke-width="2"/>
  <line x1="820" y1="358" x2="820" y2="386" stroke="#1e40af" stroke-width="2"/>
  <line x1="280" y1="386" x2="820" y2="386" stroke="#1e40af" stroke-width="2"/>
  <line x1="550" y1="386" x2="550" y2="410" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Gate label -->
  <rect x="365" y="410" width="370" height="46" rx="6" fill="#fee2e2" stroke="#991b1b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="550" y="430" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">⚠  Verification gate</text>
  <text x="550" y="446" text-anchor="middle" font-size="11" fill="#7f1d1d">Cannot submit a filing until both ✓ (architecture §10.1)</text>

  <line x1="550" y1="456" x2="550" y2="488" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Login + year switcher -->
  <rect x="420" y="488" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="513" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">4.  Login → /home</text>
  <text x="550" y="531" text-anchor="middle" font-size="11" fill="#475569">FY year switcher · default current FY</text>

  <line x1="550" y1="544" x2="550" y2="572" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Upload documents -->
  <rect x="420" y="572" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="597" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">5.  Upload documents</text>
  <text x="550" y="615" text-anchor="middle" font-size="11" fill="#475569">Form 16 · 26AS · AIS · bank CSV · slip</text>

  <line x1="550" y1="628" x2="550" y2="656" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. FY Router (system) -->
  <rect x="320" y="656" width="460" height="64" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="550" y="682" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">6.  FY Router (system)</text>
  <text x="550" y="700" text-anchor="middle" font-size="11" fill="#475569">extracts dates → routes each item to its FY filing</text>
  <text x="550" y="714" text-anchor="middle" font-size="11" fill="#475569">creates filings lazily · CSVs spanning FYs are split per row</text>

  <line x1="550" y1="720" x2="550" y2="748" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Inbox decision -->
  <polygon points="550,748 700,800 550,852 400,800" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="550" y="795" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">7.  Unresolved items?</text>
  <text x="550" y="812" text-anchor="middle" font-size="11" fill="#78350f">router_inbox</text>

  <!-- yes → resolve -->
  <line x1="700" y1="800" x2="800" y2="800" stroke="#92400e" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="750" y="792" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">yes</text>
  <rect x="800" y="772" width="200" height="56" rx="8" fill="#ffffff" stroke="#92400e" stroke-width="2"/>
  <text x="900" y="795" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Resolve in inbox</text>
  <text x="900" y="813" text-anchor="middle" font-size="11" fill="#475569">route or discard each</text>
  <!-- back to flow -->
  <line x1="900" y1="828" x2="900" y2="870" stroke="#92400e" stroke-width="2"/>
  <line x1="900" y1="870" x2="550" y2="870" stroke="#92400e" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- no → review txns -->
  <line x1="550" y1="852" x2="550" y2="900" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="568" y="880" font-size="11" font-weight="600" fill="#1e3a8a">no</text>

  <!-- 8. Review transactions -->
  <rect x="420" y="900" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="925" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">8.  Review transactions</text>
  <text x="550" y="943" text-anchor="middle" font-size="11" fill="#475569">verify categories · 80%+ rule-based</text>

  <line x1="550" y1="956" x2="550" y2="984" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9. Precheck regime -->
  <rect x="420" y="984" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="1009" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">9.  Precheck regime (115BAC)</text>
  <text x="550" y="1027" text-anchor="middle" font-size="11" fill="#475569">OK / INFO / WARN_HIGH / BLOCK</text>

  <line x1="550" y1="1040" x2="550" y2="1068" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. Regime decision -->
  <polygon points="550,1068 750,1130 550,1192 350,1130" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="550" y="1120" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">10.  Level?</text>
  <text x="550" y="1138" text-anchor="middle" font-size="11" fill="#78350f">Section 115BAC(6)</text>
  <text x="550" y="1152" text-anchor="middle" font-size="11" fill="#78350f">lifetime lock check</text>

  <!-- WARN_HIGH → acknowledge -->
  <line x1="750" y1="1130" x2="850" y2="1130" stroke="#92400e" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="800" y="1122" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">WARN_HIGH</text>
  <rect x="850" y="1102" width="220" height="56" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="960" y="1124" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Acknowledge modal</text>
  <text x="960" y="1142" text-anchor="middle" font-size="11" fill="#78350f">text hash logged · audit</text>

  <!-- BLOCK exit -->
  <line x1="350" y1="1130" x2="250" y2="1130" stroke="#991b1b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="300" y="1122" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">BLOCK</text>
  <rect x="30" y="1102" width="220" height="56" rx="28" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="140" y="1124" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">422 regime_switch_blocked</text>
  <text x="140" y="1142" text-anchor="middle" font-size="11" fill="#7f1d1d">cannot proceed</text>

  <!-- OK / INFO down -->
  <line x1="550" y1="1192" x2="550" y2="1228" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="568" y="1212" font-size="11" font-weight="600" fill="#1e3a8a">OK / INFO</text>

  <!-- WARN_HIGH back into flow -->
  <line x1="960" y1="1158" x2="960" y2="1210" stroke="#92400e" stroke-width="2"/>
  <line x1="960" y1="1210" x2="680" y2="1210" stroke="#92400e" stroke-width="2"/>
  <line x1="680" y1="1210" x2="680" y2="1228" stroke="#92400e" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- 11. Calculate -->
  <rect x="420" y="1228" width="260" height="56" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="1253" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">11.  POST /calculate</text>
  <text x="550" y="1271" text-anchor="middle" font-size="11" fill="#475569">deterministic · trace persisted</text>

  <line x1="550" y1="1284" x2="550" y2="1312" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 12. Request submit OTP -->
  <rect x="380" y="1312" width="340" height="56" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="550" y="1337" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">12.  POST /auth/request-submit-otp</text>
  <text x="550" y="1355" text-anchor="middle" font-size="11" fill="#14532d">fresh 6-digit OTP bound to filing_id · 10-min TTL</text>

  <line x1="550" y1="1368" x2="550" y2="1396" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 13. Submit with OTP -->
  <rect x="380" y="1396" width="340" height="56" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="550" y="1421" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">13.  POST /filings/{id}/submit</text>
  <text x="550" y="1439" text-anchor="middle" font-size="11" fill="#14532d">acknowledgment + verification_id + otp</text>

  <line x1="550" y1="1452" x2="550" y2="1480" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Terminal: submitted -->
  <rect x="380" y="1480" width="340" height="56" rx="28" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="550" y="1505" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">✓  Filing submitted</text>
  <text x="550" y="1522" text-anchor="middle" font-size="11" fill="#1e3a8a">enters officer L1 worklist · notifications start (L1→L5)</text>

  <!-- Legend -->
  <g transform="translate(40, 1560)" font-size="11">
    <rect x="0" y="-12" width="14" height="14" rx="7" fill="#dbeafe" stroke="#1e40af"/>
    <text x="20" y="0" fill="#0f172a">Terminal</text>
    <rect x="90" y="-12" width="14" height="14" fill="#ffffff" stroke="#1e40af"/>
    <text x="110" y="0" fill="#0f172a">Action</text>
    <polygon points="180,-12 197,0 180,12 163,0" fill="#fef3c7" stroke="#92400e"/>
    <text x="205" y="0" fill="#0f172a">Decision</text>
    <rect x="275" y="-12" width="14" height="14" fill="#dcfce7" stroke="#166534"/>
    <text x="295" y="0" fill="#0f172a">Submit-OTP step (extra gate)</text>
    <rect x="490" y="-12" width="14" height="14" fill="#fee2e2" stroke="#991b1b"/>
    <text x="510" y="0" fill="#0f172a">Hard block</text>
    <rect x="585" y="-12" width="14" height="14" fill="#f1f5f9" stroke="#475569"/>
    <text x="605" y="0" fill="#0f172a">System / auto</text>
  </g>
</svg>
